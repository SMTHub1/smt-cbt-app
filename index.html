function toggleSubject(sub,btn){
if(selectedSubjects[sub]){
delete selectedSubjects[sub];
btn.classList.remove("selectedBtn");
}else{
selectedSubjects[sub]=true;
btn.classList.add("selectedBtn");
}
updateTotal();
}

function updateTotal(){
let total = 0;
for(let s in selectedSubjects){
total += +document.getElementById(s+"Count").value;
}
document.getElementById("totalQ").innerText = total;
}

function startExam(){
let name = document.getElementById("name").value;
let id = document.getElementById("examID").value;
let time = +document.getElementById("timeInput").value;

if(!name || !id || !time){
alert("Fill all fields!");
return;
}

let pool = [];

for(let sub in selectedSubjects){
let count = +document.getElementById(sub+"Count").value;

if(!questionBank[sub]){
alert("Missing question bank for "+sub);
return;
}

pool = pool.concat(shuffle(questionBank[sub]).slice(0,count));
}

quiz = shuffle(pool);
answers = new Array(quiz.length).fill(null);
current = 0;
timeLeft = time * 60;
submitted = false;

document.getElementById("startBox").style.display="none";
document.getElementById("quizBox").style.display="block";

loadQuestion();
startTimer();
}

function loadQuestion(){

let q = quiz[current];

let min = Math.floor(timeLeft/60);
let sec = timeLeft%60;
sec = sec<10 ? "0"+sec : sec;

let nav = "";
quiz.forEach((_,i)=>{

let cls = "";
if(i===current) cls = "currentQ";
else if(answers[i] !== null) cls = "answeredQ"; // ✅ GREEN

nav += `<button class="${cls}" onclick="goTo(${i})">${i+1}</button>`;
});

let html = `
<p>Time: <span id="timer">${min}:${sec}</span></p>
${nav}
<h3>${q.q}</h3>
`;

q.o.forEach(opt=>{
html += `<button class="${answers[current]===opt?'selectedBtn':''}" onclick="selectAnswer('${opt}')">${opt}</button>`;
});

html += `
<br><br>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="finish()">Submit</button>
`;

document.getElementById("quizBox").innerHTML = html;
}

function goTo(i){current=i;loadQuestion();}
function next(){if(current<quiz.length-1)current++;loadQuestion();}
function prev(){if(current>0)current--;loadQuestion();}

function selectAnswer(ans){
answers[current]=ans;
loadQuestion();
}

function finish(){

if(submitted) return; // ✅ prevent double submit
submitted = true;

clearInterval(timer);

let subjectScore = {};
let subjectTotal = {};

quiz.forEach(q=>{
if(!subjectTotal[q.s]) subjectTotal[q.s]=0;
subjectTotal[q.s]++;
});

quiz.forEach((q,i)=>{
if(!subjectScore[q.s]) subjectScore[q.s]=0;
if(answers[i]===q.a) subjectScore[q.s]++;
});

let html = "<h2>RESULT</h2>";

let grandTotal = 0;
let grandMax = 0;

for(let s in subjectTotal){
let score = subjectScore[s]||0;
let total = subjectTotal[s];
let percent = Math.round((score/total)*100);

html += `<p>${s.toUpperCase()}: ${percent}/100</p>`;
grandTotal += percent;
grandMax += 100;
}

html += `<h3>Total: ${grandTotal}/${grandMax}</h3>`;

// SAVE
let data = JSON.parse(localStorage.getItem("cbtResults")||"[]");

data.push({
name: document.getElementById("name").value,
id: document.getElementById("examID").value,
score: grandTotal,
percent: Math.round((grandTotal/grandMax)*100)
});

localStorage.setItem("cbtResults",JSON.stringify(data));

// CORRECTIONS
html += "<h3>Corrections</h3>";

quiz.forEach((q,i)=>{
html += `
<p>${q.q}<br>
Your: <span class="${answers[i]===q.a?'correct':'wrong'}">${answers[i]}</span> |
Correct: ${q.a}
</p>`;
});

html += `<button onclick="location.reload()">Restart</button>`;

document.getElementById("quizBox").innerHTML = html;
}

function startTimer(){
timer = setInterval(()=>{
timeLeft--;

if(timeLeft <= 0){
finish(); // ✅ auto submit
return;
}

loadQuestion();
},1000);
}

function showDashboard(){

let data = JSON.parse(localStorage.getItem("cbtResults")||"[]");

let html = "<h2>TEACHER DASHBOARD</h2><table border='1'><tr><th>Name</th><th>ID</th><th>Score</th><th>%</th></tr>";

data.forEach(r=>{
html += `<tr><td>${r.name}</td><td>${r.id}</td><td>${r.score}</td><td>${r.percent}%</td></tr>`;
});

html += "</table><br><button onclick='location.reload()'>Back</button>";

document.getElementById("startBox").innerHTML = html;
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

</script>
